# Project Configuration for SSD1306 OLED Display Demo on Arduino Uno Q

# Enable I2C for display communication
CONFIG_I2C=y

# Enable GPIO
CONFIG_GPIO=y

# Enable Rust support
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# Enable logging for debug output
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=n

# Increase stack size for Rust (embedded-graphics needs more stack)
CONFIG_MAIN_STACK_SIZE=16384

# Enable debug output via serial console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable counter driver (for timing)
CONFIG_COUNTER=y
