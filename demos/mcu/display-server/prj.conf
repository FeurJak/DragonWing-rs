# Project Configuration for Display Server on Arduino Uno Q
# Controls SSD1306 OLED (I2C) and LED Matrix via SPI RPC

# Enable I2C for SSD1306 display
CONFIG_I2C=y

# Enable SPI for RPC communication with Linux MPU
CONFIG_SPI=y
CONFIG_SPI_SLAVE=y

# Enable GPIO for LED matrix
CONFIG_GPIO=y

# Enable Rust support
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# Enable logging for debug output
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=n

# Increase stack size for Rust (embedded-graphics + RPC needs more stack)
CONFIG_MAIN_STACK_SIZE=32768

# Enable debug output via serial console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable counter driver for LED matrix timing
CONFIG_COUNTER=y

# Ring buffer for SPI (used by RPC transport)
CONFIG_RING_BUFFER=y
