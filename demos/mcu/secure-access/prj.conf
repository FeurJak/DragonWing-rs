# Secure Access Demo Configuration for Arduino Uno Q
# PQ-Ratchet with TrustZone ITS storage

# Enable Rust support
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=n

# Stack size for Rust (needs extra for PQ-Ratchet operations)
# PQ-Ratchet state: ~4KB
# X-Wing operations: ~5KB peak
# Chunk reassembly buffer: up to 128KB (handled separately)
# SAGA operations: ~2KB
CONFIG_MAIN_STACK_SIZE=131072

# Heap size for temporary allocations
CONFIG_HEAP_MEM_POOL_SIZE=65536

# Enable SPI driver (for MCU-MPU communication)
CONFIG_SPI=y

# Enable GPIO (for LED matrix)
CONFIG_GPIO=y

# Console output
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable counter driver for LED matrix timing
CONFIG_COUNTER=y

# Enable hardware RNG for key generation
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=n
CONFIG_ENTROPY_DEVICE_RANDOM_GENERATOR=y

# Enable zcbor for CBOR encoding/decoding
CONFIG_ZCBOR=y

# Enable mbedTLS for XChaCha20-Poly1305 and Ed25519
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_CIPHER_CHACHA20_ENABLED=y
CONFIG_MBEDTLS_POLY1305=y
CONFIG_MBEDTLS_CHACHAPOLY_AEAD_ENABLED=y
CONFIG_MBEDTLS_HASH_ALL_ENABLED=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384

# ============================================================================
# PSA Secure Storage Configuration (TrustZone ITS)
# ============================================================================
CONFIG_MBEDTLS_PSA_CRYPTO_C=y

# Enable Zephyr Secure Storage subsystem
CONFIG_SECURE_STORAGE=y
CONFIG_SECURE_STORAGE_ITS_IMPLEMENTATION_ZEPHYR=y

# Storage backend: NVS via Settings subsystem
CONFIG_SECURE_STORAGE_ITS_STORE_IMPLEMENTATION_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Enable AEAD transform for encryption at rest
CONFIG_SECURE_STORAGE_ITS_TRANSFORM_IMPLEMENTATION_AEAD=y

# Maximum data size for ITS entries
# PQ-Ratchet state is 3692 bytes, use 4096 for headroom
CONFIG_SECURE_STORAGE_ITS_MAX_DATA_SIZE=4096
